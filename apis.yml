description: >-
  Yum China Holdings is the largest restaurant company in China by system sales,
  operating KFC, Pizza Hut, Taco Bell, Lavazza, Little Sheep, and Huang Ji Huang
  restaurants. As the exclusive licensee of Yum! Brands in mainland China, Yum China
  serves over 16,000 restaurants across China and operates Super App platforms with
  over 590 million loyalty members.
